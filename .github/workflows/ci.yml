name: CI - PR 체크

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ── Job 1: Rust (cargo fmt + clippy + test) ────────────────────────────
  rust:
    name: Rust 검증 (fmt + clippy + test)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Rust stable 설치 (clippy, rustfmt 포함)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cargo.toml 존재 확인
        id: check-rust
        run: |
          if [ -f "src-tauri/Cargo.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️  src-tauri/Cargo.toml 없음 — Rust CI 건너뜁니다."
          fi

      - name: cargo fmt 검사
        if: steps.check-rust.outputs.exists == 'true'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo clippy
        if: steps.check-rust.outputs.exists == 'true'
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: cargo test
        if: steps.check-rust.outputs.exists == 'true'
        env:
          DATABASE_URL: "sqlite::memory:"
          SQLX_OFFLINE: "true"
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # ── Job 2: Next.js (typecheck + lint + build) ──────────────────────────
  frontend:
    name: Next.js 검증 (typecheck + lint + build)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pnpm 설치
        run: npm install -g pnpm

      - name: package.json 존재 확인
        id: check-frontend
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⏭️  package.json 없음 — 프론트엔드 CI 건너뜁니다."
          fi

      - name: 의존성 설치
        if: steps.check-frontend.outputs.exists == 'true'
        run: pnpm install

      - name: TypeScript 타입 검사
        if: steps.check-frontend.outputs.exists == 'true'
        run: pnpm tsc --noEmit

      - name: ESLint
        if: steps.check-frontend.outputs.exists == 'true'
        run: pnpm lint

      - name: Next.js static export 빌드 (Tauri 번들 검증)
        if: steps.check-frontend.outputs.exists == 'true'
        run: pnpm build

  # ── Job 3: Hotfix 범위 검증 (현재 구조 유지) ──────────────────────────
  # Harness Strict Guardrails — hotfix/* 브랜치 PR 시에만 실행
  # 파일 3개 초과 또는 코드 50줄 초과 시 CI 실패 → Sprint 프로세스 강제
  validate-hotfix-scope:
    name: Hotfix 범위 검증 (파일≤3, 코드≤50줄)
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'hotfix/')

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: main 브랜치 fetch
        run: git fetch origin main

      - name: Hotfix 범위 검증
        run: |
          FILES=$(git diff origin/main...HEAD --name-only | grep -v '^$' | wc -l | tr -d ' ')
          LINES=$(git diff origin/main...HEAD | grep -E '^[+-][^+-]' | wc -l | tr -d ' ')

          echo "── Hotfix 범위 검증 ──────────────────────────"
          echo "변경 파일 수: ${FILES} (허용: ≤ 3)"
          echo "변경 코드 줄 수: ${LINES} (허용: ≤ 50)"
          echo "────────────────────────────────────────────"

          FAIL=0
          if [ "$FILES" -gt 3 ]; then
            echo "❌ FAIL: 파일 ${FILES}개 > 3개"
            echo "   → Sprint 프로세스를 사용하세요. docs/dev-process.md 섹션 2 참조"
            FAIL=1
          fi
          if [ "$LINES" -gt 50 ]; then
            echo "❌ FAIL: 코드 ${LINES}줄 > 50줄"
            echo "   → Sprint 프로세스를 사용하세요. docs/dev-process.md 섹션 2 참조"
            FAIL=1
          fi

          if [ "$FAIL" -eq 0 ]; then
            echo "✅ Hotfix 범위 검증 통과"
          fi

          exit $FAIL

  # ── Job 4: Tauri 빌드 매트릭스 (main PR에서만) ────────────────────────
  # develop → main PR 시에만 실행 (Windows + macOS 빌드 검증)
  # cipher feature 활성화 — SQLCipher + vendored OpenSSL 통합 검증 (T11, ADR-001)
  tauri-build:
    name: Tauri 빌드 (${{ matrix.platform }})
    needs: [rust, frontend]
    if: github.base_ref == 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--features cipher'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --features cipher'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pnpm 설치
        run: npm install -g pnpm

      - name: Strawberry Perl 설치 (Windows — SQLCipher OpenSSL 빌드)
        if: matrix.platform == 'windows-latest'
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'
          distribution: strawberry

      - name: Rust stable 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: 의존성 설치
        run: pnpm install

      - name: Tauri 빌드 (cipher feature on)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
