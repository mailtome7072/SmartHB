name: CD - 프로덕션 배포

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
  NGINX_IMAGE: ghcr.io/${{ github.repository }}-nginx

jobs:
  build-and-push:
    name: 이미지 빌드 & GHCR push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 태그 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
            type=semver,pattern=v{{version}}

      # TODO: Dockerfile 경로를 프로젝트에 맞게 수정하세요
      - name: 백엔드 이미지 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile.prod
          target: runtime
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}

      - name: 프론트엔드 이미지 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile.prod
          target: runtime
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: nginx 이미지 빌드 & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ steps.meta.outputs.version }}

  deploy:
    name: 프로덕션 서버 배포
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /opt/app
            sudo curl -fsSL \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml \
              -o docker-compose.prod.yml
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker image prune -f
