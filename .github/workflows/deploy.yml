name: CD - GitHub Release 배포

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: 빌드 & 릴리즈 (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: pnpm 설치
        run: npm install -g pnpm

      - name: Rust stable 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: 의존성 설치
        run: pnpm install

      - name: Tauri 빌드 및 GitHub Release 업로드
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SmartHB ${{ github.ref_name }}"
          releaseBody: |
            ## 변경사항
            CHANGELOG.md 참조

            ## 설치 방법
            - **Windows**: `.msi` 또는 `.exe` 파일 다운로드 후 실행
            - **macOS**: `.dmg` 파일 다운로드 후 응용 프로그램 폴더로 이동
              > ⚠️ 코드 서명 없음 — 첫 실행 시 시스템 환경설정 > 보안에서 수동 허용 필요
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
