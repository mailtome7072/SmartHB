# 프로덕션 배포용 Docker Compose
# deploy.yml이 서버에서 wget으로 이 파일을 다운로드한 뒤 실행합니다.
#
# ⚠️  /setup-project 실행 후 이미지명이 자동 치환됩니다.
# ⚠️  실제 서비스 포트·볼륨은 첫 스프린트에서 Dockerfile 생성 시 확정하세요.

services:
  backend:
    image: ghcr.io/${github_org}/${github_repo}-backend:latest
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    image: ghcr.io/${github_org}/${github_repo}-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: ghcr.io/${github_org}/${github_repo}-nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

  db:
    image: postgres:16
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
